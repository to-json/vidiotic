[package]
name = "vidiotic"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "vidiotic"
path = "src/main.rs"

[[bin]]
name = "spike_naga"
path = "src/bin/spike_naga.rs"

[[bin]]
name = "spike_render"
path = "src/bin/spike_render.rs"

[[bin]]
name = "spike_decode"
path = "src/bin/spike_decode.rs"

[dependencies]
ffmpeg-next = "8.1"
crossbeam-channel = "0.5"
naga = { version = "29", features = ["glsl-in", "wgsl-in"] }
snap = "1.1"
wgpu = { version = "29", features = ["glsl", "naga-ir"] }
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"
anyhow = "1"
log = "0.4"
env_logger = "0.11"

